[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor

[unix_http_server]
file=/var/run/supervisor.sock

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

; ── FastAPI via Uvicorn ───────────────────────────────────────────
[program:fastapi]
command=/fastapi/backend_env/bin/uvicorn main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips *
directory=/fastapi
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/fastapi.err.log
stdout_logfile=/var/log/supervisor/fastapi.out.log
environment=PATH="/fastapi/backend_env/bin:%(ENV_PATH)s"

; ── Add more services below if needed ────────────────────────────
; e.g. Celery worker, beat scheduler, etc.
;[program:celery]
;command=/fastapi/backend_env/bin/celery -A myapp worker --loglevel=info
